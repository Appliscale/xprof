name: CI

on:
  pull_request:
  push:
    branches:
      - 'github_actions'
      - 'master'

jobs:
  test:
    name: OTP ${{ matrix.otp_version }}
    runs-on: ubuntu-latest
    container: erlang:${{ matrix.otp_version }}

    strategy:
      fail-fast: false
      matrix:
        include:
        - otp_version: 26
          # hdr_histogram NIF requires the below PR to be merged to build on OTP 26
          # https://github.com/HdrHistogram/hdr_histogram_erl/pull/44
          erl_hist: true

        - otp_version: 25

        - otp_version: 24

        - otp_version: 23

        - otp_version: 22

        - otp_version: 21
          send_coverage: true
          run_dialyzer: true

    steps:
    - uses: actions/checkout@v3

    - if: matrix.old_rebar
      run: echo "REBAR3=./rebar3" >> $GITHUB_ENV

    - if: matrix.erl_hist
      run: echo "XPROF_ERL_HIST=true" >> $GITHUB_ENV

    - if: matrix.old_cowboy
      run: echo "COWBOY_VERSION=1.1.2" >> $GITHUB_ENV

    - name: Cache hex packages
      uses: actions/cache@v3
      with:
        path: $HOME/.cache/rebar3
        key: ${{ matrix.otp_version }}-rebar3-cache

    - run: make test

    - if: matrix.run_dialyzer
      run: make dialyzer
      timeout-minutes: 8

    - if: matrix.send_coverage && success()
      run: ./rebar3 as test coveralls send
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

  # Same as the "test" job but for OTP 18-20, whose containers ship a glibc
  # too old for the node20 runtime that actions/checkout and actions/cache
  # now require. This job checks out with plain git and skips the cache.
  test_legacy:
    name: OTP ${{ matrix.otp_version }} (legacy)
    runs-on: ubuntu-latest
    container: erlang:${{ matrix.otp_version }}

    strategy:
      fail-fast: false
      matrix:
        include:
        - otp_version: 20

        - otp_version: 19

        - otp_version: 19
          erl_hist: true

        - otp_version: 18
          # old_rebar fails with "Package not found in registry: {<<"hdr_histogram">>,<<"0.5.0">>}."
          # with hdr_histogram NIF: xprof_core_hist_SUITE: Segmentation fault (core dumped)
          erl_hist: true
          old_cowboy: true

    steps:
    - name: Checkout with git (avoids node-based actions on old glibc)
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        git init -q
        git remote add origin "https://github.com/${{ github.repository }}"
        git fetch -q --depth 1 origin "${{ github.ref }}"
        git checkout -q FETCH_HEAD

    - if: matrix.old_rebar
      run: echo "REBAR3=./rebar3" >> $GITHUB_ENV

    - if: matrix.erl_hist
      run: echo "XPROF_ERL_HIST=true" >> $GITHUB_ENV

    - if: matrix.old_cowboy
      run: echo "COWBOY_VERSION=1.1.2" >> $GITHUB_ENV

    - run: make test

  test_json_lib:
    name: Test different json lib (${{ matrix.json_lib }} | OTP ${{ matrix.otp_version }})
    runs-on: ubuntu-latest

    container: erlang:${{ matrix.otp_version }}

    strategy:
      fail-fast: false
      matrix:
        otp_version: [21]
        json_lib: [jiffy, jsx, thoas]

    steps:
    - uses: actions/checkout@v3

    - name: Cache hex packages
      uses: actions/cache@v3
      with:
        path: $HOME/.cache/rebar3
        key: ${{ matrix.otp_version }}-rebar3-cache-json-lib

    - run: make test_${{ matrix.json_lib }}

  test_docs:
    name: Test generating documentation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - elixir: 1.15.x
            otp_version: 26
            rebar3: '3.22.1'
            # hdr_histogram NIF requires the below PR to be merged to build on OTP 26
            # https://github.com/HdrHistogram/hdr_histogram_erl/pull/44
            erl_hist: true

    steps:
    - uses: actions/checkout@v3
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.otp_version}}
        elixir-version: ${{matrix.elixir}}
        rebar3-version: ${{matrix.rebar3}}

    - if: matrix.erl_hist
      run: echo "XPROF_ERL_HIST=true" >> $GITHUB_ENV

    - name: Cache hex packages
      uses: actions/cache@v3
      with:
        path: $HOME/.cache/rebar3
        key: ${{ matrix.otp_version }}-rebar3-cache

    - run: make gen_ex_doc

  test_elixir:
    name: Test with Elixir (Elixir ${{matrix.elixir}} | OTP ${{matrix.otp_version}})
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: 1.11.4
            otp_version: 24
            rebar3: '3.18.0'
            os: ubuntu-latest

          - elixir: 1.12.x
            otp_version: 24
            rebar3: '3.19.0'
            os: ubuntu-latest

          - elixir: 1.13.x
            otp_version: 24
            rebar3: '3.20.0'
            os: ubuntu-latest

          - elixir: 1.14.x
            otp_version: 25
            rebar3: '3.21.0'
            os: ubuntu-latest

          - elixir: 1.15.x
            otp_version: 26
            rebar3: '3.22.1'
            # hdr_histogram NIF requires the below PR to be merged to build on OTP 26
            # https://github.com/HdrHistogram/hdr_histogram_erl/pull/44
            erl_hist: true
            os: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{matrix.otp_version}}
        elixir-version: ${{matrix.elixir}}
        rebar3-version: ${{matrix.rebar3}}

    - if: matrix.old_rebar
      run: echo "REBAR3=./rebar3" >> $GITHUB_ENV

    - if: matrix.erl_hist
      run: echo "XPROF_ERL_HIST=true" >> $GITHUB_ENV

    - if: matrix.old_cowboy
      run: echo "COWBOY_VERSION=1.1.2" >> $GITHUB_ENV

    - name: Cache hex packages
      uses: actions/cache@v3
      with:
        path: $HOME/.cache/rebar3
        key: ${{ matrix.otp_version }}-rebar3-cache

    - run: make test

  test_front_end:
    name: Test front-end
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: '8'

    - name: Cache build artifacts
      uses: actions/cache@v3
      with:
        path: apps/xprof_gui/priv/node_modules
        key: test_front_end

    - run: make bootstrap_front_end

    - run: make test_front_end
